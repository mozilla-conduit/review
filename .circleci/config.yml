version: 2.1

# Define a filter that matches tags and not branches.
tags-only-filter: &tags-only-filter
  filters:
    tags:
      only:
        - /.*/
    branches:
      ignore:
        - /.*/

# Define a filter that matches tags and branches.
branches-and-tags-filter: &branches-and-tags-filter
  filters:
    tags:
      only:
        - /.*/
    branches:
      only:
        - /.*/

orbs:
  win: circleci/windows@5.0.0

workflows:
  version: 2
  test:
    jobs:
      - test_3_9:
          <<: *branches-and-tags-filter
      - test_3_10:
          <<: *branches-and-tags-filter
      - test_3_11:
          <<: *branches-and-tags-filter
      - test_3_12:
          <<: *branches-and-tags-filter
      - test_3_13:
          <<: *branches-and-tags-filter
      - test_3_14:
          <<: *branches-and-tags-filter
      - test_package:
          <<: *branches-and-tags-filter
      - publish:
          <<: *tags-only-filter
          requires:
            - test_3_9
            - test_3_10
            - test_3_11
            - test_3_12
            - test_3_13
            - test_3_14
            - test_package

jobs:
  test_3_9: &test_template
    docker:
      - image: cimg/python:3.9
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: setup
          command: |
            set -e
            mkdir -p ~/test-reports
            mkdir -p ~/coredumps
            # Install project and dev dependencies.
            uv sync --group dev --locked
            # Configure hg.
            echo -e "[ui]\nusername=mozphab test <moz-phab@example.com>" > ~/.hgrc
            echo -e "[extensions]\nevolve=" >> ~/.hgrc
            # Configure git.
            git config --global user.email "moz-phab-tests@example.com"
            git config --global user.name "moz-phab tests"
            # Install and configure jj.
            JJ_VERSION="0.33.0"
            JJ_PLATFORM="x86_64-unknown-linux-musl"
            JJ_FILENAME="jj-v${JJ_VERSION}-${JJ_PLATFORM}.tar.gz"
            JJ_EXPECTED_SHA="2703e13b3d5623aa67e19358b257fe5a761faa883bd0bd716d0b1c801a214093"
            curl -LO "https://github.com/jj-vcs/jj/releases/download/v${JJ_VERSION}/${JJ_FILENAME}"
            echo "${JJ_EXPECTED_SHA}  ${JJ_FILENAME}" | sha256sum -c
            tar -xzf "${JJ_FILENAME}"
            sudo mv jj /usr/local/bin
            jj config set --user user.name "moz-phab tests"
            jj config set --user user.email "moz-phab-tests@example.com"
      - run:
          name: versions
          command: |
            set -e
            uv self version
            uv run python3 --version
            git --version
            jj --version
            uv pip list
      - run:
          name: run tests
          command: |
            set -e
            ulimit -c unlimited
            for test_file in tests/test_*.py; do
              uv run python3 -m pytest --junitxml=~/test-reports/junit-$( basename $test_file .py ).xml -vv $test_file
            done
            cp core.* ~/coredumps || true
      - store_test_results:
          path: ~/test-reports
      - store_artifacts:
          path: ~/test-reports
      - store_artifacts:
          path: ~/coredumps
  test_3_10:
    <<: *test_template
    docker:
      - image: cimg/python:3.10
  test_3_11:
    <<: *test_template
    docker:
      - image: cimg/python:3.11
  test_3_12:
    <<: *test_template
    docker:
      - image: cimg/python:3.12
  test_3_13:
    <<: *test_template
    docker:
      - image: cimg/python:3.13
  test_3_14:
    <<: *test_template
    docker:
      - image: cimg/python:3.14

  test_win:
    environment:
      - PYTHON_VERSION: "3.9"
    executor:
      name: win/default
    steps:
      - checkout
      - run:
          name: install uv
          command: powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"
      - run:
          name: install dependencies
          command: |
            uv python install $env:PYTHON_VERSION
            uv sync --python $env:PYTHON_VERSION --group dev
            git config --global user.email "moz-phab-tests@example.com"
            git config --global user.name "moz-phab tests"
      - run:
          name: versions
          command: |
            uv self version
            uv run python --version
            git --version
            uv pip list
      - run:
          name: run tests
          command: |
            mkdir test-reports
            function RunTest {
              & uv run python -m pytest -vv @args
              if ($LASTEXITCODE -ne 0) {
                exit $LASTEXITCODE
              }
            }
            foreach ($f in Get-ChildItem -Path "tests" -Filter test_*.py) {
              RunTest --junitxml=test-reports/junit-$($f.BaseName).xml $f.FullName
            }
      - store_test_results:
          path: test-reports
      - store_artifacts:
          path: test-reports

  test_package:
    docker:
      - image: cimg/python:3.9
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: build and verify package
          command: |
            uv build
            uv venv verify-venv
            uv pip install --python verify-venv/bin/python dist/mozphab*.tar.gz
            uv pip show --python verify-venv/bin/python MozPhab
            verify-venv/bin/moz-phab version
  publish:
    docker:
      - image: cimg/python:3.9
    working_directory: ~/repo
    steps:
    - checkout
    - run:
        name: build and publish
        # Generate packages and upload to PyPI via `twine`.
        command: |
            uv build
            uv tool run twine upload --repository pypi dist/*
